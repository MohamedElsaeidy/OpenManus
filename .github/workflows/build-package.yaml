name: Production Package

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to receive the package (optional)
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      package_name: ${{ steps.bundle.outputs.package_name }}
      archive: ${{ steps.bundle.outputs.archive }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build production frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble production bundle
        id: bundle
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          build_date=$(date --utc +%Y%m%d)
          package_name="openmanus-production-${build_date}-${short_sha}"
          stage_dir="release/${package_name}"

          mkdir -p "${stage_dir}"
          git archive --format=tar HEAD | tar --extract --directory="${stage_dir}"
          rm -rf \
            "${stage_dir}/.github" \
            "${stage_dir}/tests" \
            "${stage_dir}/research" \
            "${stage_dir}/.pre-commit-config.yaml"

          rm -rf "${stage_dir}/frontend/dist"
          cp -R frontend/dist "${stage_dir}/frontend/dist"

          python - "${stage_dir}/BUILD_INFO.json" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          payload = {
              "repository": os.environ["GITHUB_REPOSITORY"],
              "commit": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "built_at": datetime.now(timezone.utc).isoformat(),
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY

          docker compose --file "${stage_dir}/docker-compose.yml" config --quiet

          tar --create --gzip \
            --file "release/${package_name}.tar.gz" \
            --directory release "${package_name}"
          sha256sum "release/${package_name}.tar.gz" \
            > "release/${package_name}.tar.gz.sha256"

          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "archive=release/${package_name}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload production package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.package_name }}
          path: |
            ${{ steps.bundle.outputs.archive }}
            ${{ steps.bundle.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish package summary
        run: |
          {
            echo "## Production package"
            echo
            echo "Artifact: \`${{ steps.bundle.outputs.package_name }}\`"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Retention: 30 days"
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    if: >-
      github.ref == 'refs/heads/main' ||
      github.event_name == 'release' ||
      inputs.release_tag != ''
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download production package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.package_name }}
          path: release

      - name: Publish GitHub production release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.package.outputs.package_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_tag="${REQUESTED_RELEASE_TAG:-${RELEASE_EVENT_TAG:-}}"
          if [ -z "${release_tag}" ]; then
            release_tag="production-${GITHUB_SHA::12}"
          fi
          archive="release/${PACKAGE_NAME}.tar.gz"
          checksum="${archive}.sha256"

          test -f "${archive}"
          test -f "${checksum}"

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" \
              "${archive}#Production package" \
              "${checksum}#SHA-256 checksum" \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${release_tag}" \
              "${archive}#Production package" \
              "${checksum}#SHA-256 checksum" \
              --target "${GITHUB_SHA}" \
              --title "Production build ${GITHUB_SHA::7}" \
              --notes "Automated production package for commit ${GITHUB_SHA}." \
              --repo "${GITHUB_REPOSITORY}"
          fi

          release_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}" \
            --jq '.id')
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            --raw-field make_latest=true \
            >/dev/null

          {
            echo "## GitHub Release"
            echo
            echo "Release: \`${release_tag}\`"
            echo "This release is visible in the repository Releases section."
          } >> "${GITHUB_STEP_SUMMARY}"
