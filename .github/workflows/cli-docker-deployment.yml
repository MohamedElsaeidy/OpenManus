name: CLI Docker Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cli-docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy the Compose stack
        run: docker compose up --build --detach

      - name: Wait for the API
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API (${attempt}/60)"
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Verify deployed services
        run: |
          docker compose ps
          curl --fail --silent --show-error http://127.0.0.1:8000/api/health
          curl --fail --silent --show-error http://127.0.0.1:8000/docs >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000 >/dev/null

          for attempt in {1..30}; do
            if docker compose exec -T worker celery \
              -A server.celery_app.celery_app inspect ping --timeout 5 \
              | grep --quiet pong; then
              echo "Celery worker is ready"
              exit 0
            fi
            echo "Waiting for Celery worker (${attempt}/30)"
            sleep 2
          done
          echo "Celery worker did not become ready"
          exit 1

      - name: Verify task lifecycle through the CLI
        run: |
          set -euo pipefail
          email="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.test"
          curl --fail --silent --show-error \
            --cookie-jar cookies.txt \
            --request POST http://127.0.0.1:8000/api/auth/signup \
            --header "Content-Type: application/json" \
            --data "{\"email\":\"${email}\",\"password\":\"password\",\"name\":\"CI\"}" \
            >/dev/null

          task_json=$(curl --fail --silent --show-error \
            --cookie cookies.txt \
            --request POST http://127.0.0.1:8000/api/tasks \
            --header "Content-Type: application/json" \
            --data '{"prompt":"deployment smoke check"}')
          task_id=$(python -c 'import json,sys; print(json.load(sys.stdin)["task_id"])' <<<"${task_json}")
          test -n "${task_id}"

          curl --fail --silent --show-error \
            --cookie cookies.txt \
            --request POST "http://127.0.0.1:8000/api/tasks/${task_id}/interrupt" \
            >/dev/null || true

          for attempt in {1..60}; do
            status_json=$(curl --fail --silent --show-error \
              --cookie cookies.txt \
              "http://127.0.0.1:8000/api/tasks/${task_id}")
            status=$(python -c 'import json,sys; print(json.load(sys.stdin).get("status", ""))' <<<"${status_json}")
            echo "Task status: ${status}"
            case "${status}" in
              COMPLETED|FAILED|INTERRUPTED) exit 0 ;;
            esac
            sleep 2
          done
          echo "Task did not reach a terminal state"
          exit 1

      - name: Dump deployment logs on failure
        if: failure()
        run: docker compose logs --no-color frontend web worker postgres redis

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
